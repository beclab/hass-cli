project_name: hass-cli
builds:
  - env:
      - CGO_ENABLED=0
    binary: hass-cli
    main: .
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm
      - arm64
    goarm:
      - 7
    ignore:
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm
    ldflags:
      - -s
      - -w
      - -X main.version={{ .Version }}
dist: ./output
archives:
  # Name template MUST stay in sync with npm/scripts/install.js archiveName()
  # and scripts/install.sh: hass-cli-v<version>_<os>_<arch>.tar.gz
  - name_template: "{{ .ProjectName }}-v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
changelog:
  disable: true
